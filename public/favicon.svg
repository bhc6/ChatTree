<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Blue gradient for user/left nodes -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff" />
      <stop offset="100%" stop-color="#1d6fe8" />
    </linearGradient>
    
    <!-- Orange gradient for AI/right nodes -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#e07b00" />
    </linearGradient>
    
    <!-- Purple/Blue gradient for root/merge nodes -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>

    <!-- Glow/Shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1d6fe8" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Connection lines (Branches) -->
    <!-- From Root to Branch 1 (Left) -->
    <path d="M 256 410 Q 256 310 140 240" fill="none" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round" opacity="0.85" />
    <!-- From Root to Branch 2 (Middle) -->
    <path d="M 256 410 L 256 160" fill="none" stroke="url(#purpleGrad)" stroke-width="8" stroke-linecap="round" opacity="0.85" />
    <!-- From Root to Branch 3 (Right) -->
    <path d="M 256 410 Q 256 310 376 240" fill="none" stroke="url(#orangeGrad)" stroke-width="8" stroke-linecap="round" opacity="0.85" />
    
    <!-- Sub-branches Left -->
    <path d="M 140 240 Q 140 180 80 130" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    <path d="M 140 240 Q 140 180 200 130" fill="none" stroke="url(#purpleGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    
    <!-- Sub-branches Right -->
    <path d="M 376 240 Q 376 180 316 130" fill="none" stroke="url(#purpleGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    <path d="M 376 240 Q 376 180 436 130" fill="none" stroke="url(#orangeGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />

    <!-- Chat Bubble Nodes -->
    
    <!-- Sub-node L1 (80, 130) - Blue Chat Bubble -->
    <g transform="translate(80, 130)">
      <circle cx="0" cy="0" r="28" fill="url(#blueGrad)" />
      <!-- Chat bubble tail -->
      <path d="M -10 24 L -20 32 L -18 20 Z" fill="url(#blueGrad)" />
      <!-- Inner symbol (dots representing typing/text) -->
      <circle cx="-8" cy="0" r="3" fill="#ffffff" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
      <circle cx="8" cy="0" r="3" fill="#ffffff" />
    </g>

    <!-- Sub-node L2 (200, 130) - Purple Chat Bubble -->
    <g transform="translate(200, 130)">
      <circle cx="0" cy="0" r="28" fill="url(#purpleGrad)" />
      <path d="M 10 24 L 20 32 L 18 20 Z" fill="url(#purpleGrad)" />
      <circle cx="-8" cy="0" r="3" fill="#ffffff" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
      <circle cx="8" cy="0" r="3" fill="#ffffff" />
    </g>

    <!-- Sub-node R1 (316, 130) - Purple Chat Bubble -->
    <g transform="translate(316, 130)">
      <circle cx="0" cy="0" r="28" fill="url(#purpleGrad)" />
      <path d="M -10 24 L -20 32 L -18 20 Z" fill="url(#purpleGrad)" />
      <circle cx="-8" cy="0" r="3" fill="#ffffff" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
      <circle cx="8" cy="0" r="3" fill="#ffffff" />
    </g>

    <!-- Sub-node R2 (436, 130) - Orange Chat Bubble -->
    <g transform="translate(436, 130)">
      <circle cx="0" cy="0" r="28" fill="url(#orangeGrad)" />
      <path d="M 10 24 L 20 32 L 18 20 Z" fill="url(#orangeGrad)" />
      <circle cx="-8" cy="0" r="3" fill="#ffffff" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
      <circle cx="8" cy="0" r="3" fill="#ffffff" />
    </g>

    <!-- Mid-node Left (140, 240) - Blue Chat Bubble -->
    <g transform="translate(140, 240)">
      <circle cx="0" cy="0" r="34" fill="url(#blueGrad)" />
      <path d="M -12 28 L -24 38 L -20 22 Z" fill="url(#blueGrad)" />
      <!-- Letter 'A' or symbol representing branch -->
      <text x="0" y="7" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
    </g>

    <!-- Mid-node Center (256, 160) - Purple Chat Bubble -->
    <g transform="translate(256, 160)">
      <circle cx="0" cy="0" r="34" fill="url(#purpleGrad)" />
      <path d="M -12 28 L -24 38 L -20 22 Z" fill="url(#purpleGrad)" />
      <text x="0" y="7" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">B</text>
    </g>

    <!-- Mid-node Right (376, 240) - Orange Chat Bubble -->
    <g transform="translate(376, 240)">
      <circle cx="0" cy="0" r="34" fill="url(#orangeGrad)" />
      <path d="M 12 28 L 24 38 L 20 22 Z" fill="url(#orangeGrad)" />
      <text x="0" y="7" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
    </g>

    <!-- Root Node (256, 410) - Dark slate background circle with glowing border, containing tree stem -->
    <g transform="translate(256, 410)">
      <circle cx="0" cy="0" r="42" fill="#1a1c1d" stroke="url(#purpleGrad)" stroke-width="4" />
      <path d="M -15 28 L -30 38 L -25 20 Z" fill="#1a1c1d" stroke="url(#purpleGrad)" stroke-width="4" stroke-linejoin="round" />
      <!-- Logo Mark (Tree branch icon inside) -->
      <path d="M -12 8 L 0 -12 L 12 8 M 0 -12 L 0 14" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
